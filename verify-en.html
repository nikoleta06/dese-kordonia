  <main>
    <h2 class="section-title">Verifying sign-in</h2>
    <div class="calc">
      <p id="status">Checking your link...</p>
      <a class="btn calc-hidden" id="loginLink" href="login-en.html">Back to sign in</a>
    </div>
  </main>

  <footer>
    <img src="images/logo-footer.png?v=2" alt="Δέσε Κορδόνια" class="footer-logo">
    <div class="footer-social">
      <a href="https://instagram.com/nikol.akr" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>

  </footer>

  <script src="js/main.js?v=26" defer></script>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const API = (location.hostname === 'localhost') ? 'http://localhost:4000' : 'https://dese-kordonia-backend.onrender.com';

      async function verify() {
        const token = new URLSearchParams(location.search).get('token');
        if (!token) {
          $('status').textContent = 'Missing verification token.';
          $('loginLink').classList.remove('calc-hidden');
          return;
        }
        try {
          const r = await fetch(API + '/api/auth/verify?token=' + encodeURIComponent(token), {
            credentials: 'include'
          });
          if (r.ok) {
            $('status').textContent = "You're signed in! Redirecting to your account...";
            setTimeout(() => { location.href = 'account-en.html'; }, 1200);
          } else {
            $('status').textContent = 'This link has expired or is invalid.';
            $('loginLink').classList.remove('calc-hidden');
          }
        } catch (e) {
          $('status').textContent = "Couldn't reach the server. Is it running locally?";
          $('loginLink').classList.remove('calc-hidden');
        }
      }

      verify();
    })();
  </script>
</body>
