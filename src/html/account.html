<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Το προφίλ σου στο Δέσε Κορδόνια.">
  <meta name="robots" content="noindex">

  <link rel="canonical" href="https://nikoleta06.github.io/dese-kordonia/src/html/account.html">
  <link rel="icon" type="image/x-icon" href="../../images/favicon.ico?v=1">
  <link rel="apple-touch-icon" href="../../images/favicon.png?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=54">
</head>
<body>
  <header>
    <div class="nav-inner">
      <a class="brand" href="index.html">
        <img src="../../images/logo.png?v=2" alt="Λογότυπο Δέσε Κορδόνια" class="logo">
        Δέσε<span class="dot">.</span>Κορδόνια
      </a>
      <nav>
        <ul class="menu">
          <li><a href="index.html">Αρχική</a></li>
          <li><a href="healthy.html">Ευεξία &amp; Οφέλη</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="agones.html">Αγώνες</a></li>
          <li class="dropdown">
            <button type="button" class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">Εργαλεία <span class="caret">▾</span></button>
            <ul class="dropdown-menu">
              <li><a href="programma-5k.html">Πρόγραμμα 5K</a></li>
              <li><a href="calculator.html">Υπολογιστής</a></li>
              <li><a href="zones-palmon.html">Ζώνες Παλμών</a></li>
            </ul>
          </li>
          <li><a href="contact.html">Επικοινωνία</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h2 class="section-title">Ο λογαριασμός μου</h2>
    <p class="lead calc-hidden" id="intro">Το προφίλ σου.</p>

    <div class="calc calc-hidden" id="form">
      <div class="field">
        <label>Email</label>
        <input type="text" id="email" disabled>
      </div>
      <div class="field">
        <label for="name">Όνομα</label>
        <input type="text" id="name" placeholder="Το όνομά σου">
      </div>
      <div class="field">
        <label for="bio">Λίγα λόγια για σένα</label>
        <input type="text" id="bio" placeholder="π.χ. Τρέχω από το 2023">
      </div>
      <div class="field">
        <label><input type="checkbox" id="newsletter"> Θέλω να λαμβάνω το newsletter</label>
      </div>

      <button class="btn" id="saveBtn" type="button">Αποθήκευση</button>
      <button class="btn" id="logoutBtn" type="button" style="background:transparent;color:var(--text-dim);box-shadow:none;">Αποσύνδεση</button>

      <div class="calc-result calc-hidden" id="result"></div>
    </div>

    <p id="status">Έλεγχος σύνδεσης...</p>
  </main>

  <footer>
    <img src="../../images/logo-footer.png?v=2" alt="Δέσε Κορδόνια" class="footer-logo">
    <div class="footer-social">
      <a href="https://instagram.com/nikol.akr" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
    </div>
    <p class="footer-copy">© 2026 <span class="accent">Δέσε Κορδόνια</span></p>
  </footer>

  <script src="../js/main.js?v=26" defer></script>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const API = (location.hostname === 'localhost') ? 'http://localhost:4000' : 'https://dese-kordonia-backend.onrender.com';

      function fill(user) {
        $('email').value = user.email;
        $('name').value = user.name || '';
        $('bio').value = user.bio || '';
        $('newsletter').checked = !!user.newsletter_subscribed;
        $('status').classList.add('calc-hidden');
        $('intro').classList.remove('calc-hidden');
        $('form').classList.remove('calc-hidden');
      }

      async function load() {
        try {
          const r = await fetch(API + '/api/auth/me', { credentials: 'include' });
          if (!r.ok) {
            location.href = 'login.html';
            return;
          }
          fill(await r.json());
        } catch (e) {
          $('status').textContent = "Δεν μπόρεσα να συνδεθώ με τον server. Τρέχει τοπικά;";
        }
      }

      async function save() {
        $('saveBtn').disabled = true;
        try {
          const r = await fetch(API + '/api/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              name: $('name').value.trim(),
              bio: $('bio').value.trim(),
              newsletter_subscribed: $('newsletter').checked
            })
          });
          const result = $('result');
          result.classList.remove('calc-hidden');
          result.textContent = r.ok ? 'Αποθηκεύτηκε!' : 'Κάτι πήγε στραβά.';
        } catch (e) {
          const result = $('result');
          result.classList.remove('calc-hidden');
          result.textContent = "Δεν μπόρεσα να συνδεθώ με τον server.";
        }
        $('saveBtn').disabled = false;
      }

      async function logout() {
        try {
          await fetch(API + '/api/auth/logout', { method: 'POST', credentials: 'include' });
        } catch (e) {}
        location.href = 'index.html';
      }

      $('saveBtn').addEventListener('click', save);
      $('logoutBtn').addEventListener('click', logout);
      load();
    })();
  </script>
</body>
</html>
